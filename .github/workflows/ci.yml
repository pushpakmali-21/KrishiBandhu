name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci --prefix krishibandhu

      - name: Install backend dependencies
        run: npm ci --prefix krishibandhu-backend

      - name: Install Python ML dependencies
        run: python -m pip install -r krishibandhu-backend/requirements.txt

      - name: Lint frontend
        run: npm run lint --prefix krishibandhu

      - name: Build frontend
        run: npm run build --prefix krishibandhu

      - name: Seed Database
        run: npm run seed --prefix krishibandhu-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/krishibandhu-test

      - name: Run ML pipeline
        run: npm run ml-pipeline --prefix krishibandhu-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/krishibandhu-test

      - name: Smoke test backend
        run: npm run smoke --prefix krishibandhu-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/krishibandhu-test
